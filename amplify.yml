version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm i
    build:
      commands:
        # APP_SSM_PATH is a plain (non-secret) environment variable set in the
        # Amplify console, e.g. "/amplify/<app-id>/main"
        # Actual secrets (DATABASE_URL, JWT_SECRET_KEY, COOKIE_NAME) are stored
        # as SecureString parameters in AWS SSM Parameter Store and fetched at
        # runtime by the server via the IAM SSR Compute role.
        - NODE_OPTIONS="--max-old-space-size=4096" npm run build
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
